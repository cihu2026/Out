<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>後慈湖｜志工離園人數控管</title>

<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  .container { background: #fff; width: 92%; max-width: 420px; padding: 25px 20px; border-radius: 24px; text-align: center; border-top: 12px solid #ff4d4f; box-shadow: 0 15px 35px rgba(0,0,0,.1); }
  h1 { margin: 0 0 5px; font-size: 24px; color: #333; }
  #count { font-size: 110px; font-weight: 900; color: #ff4d4f; margin: 10px 0; line-height: 1; }
  .label { color: #888; font-size: 18px; }
  .control { display: flex; gap: 15px; margin: 20px 0; }
  .control button { flex: 1; height: 100px; font-size: 40px; font-weight: bold; border: none; border-radius: 18px; color: white; cursor: pointer; transition: transform 0.1s; }
  .control button:active { transform: scale(0.95); opacity: 0.8; }
  .btn-plus-1 { background: #ffa940; } /* 橘色 +1 */
  .btn-plus-5 { background: #52c41a; } /* 綠色 +5 */
  input { width: 100%; font-size: 28px; padding: 15px; text-align: center; border-radius: 12px; border: 2px solid #eee; margin-bottom: 15px; box-sizing: border-box; }
  .submit { width: 100%; font-size: 28px; padding: 20px; border-radius: 18px; background: #ff4d4f; color: white; border: none; font-weight: bold; box-shadow: 0 4px 0 #cf1322; }
  .submit:active { transform: translateY(4px); box-shadow: none; }
  .submit:disabled { background: #ccc; box-shadow: none; }
  .note { margin-top: 15px; font-size: 13px; color: #bbb; }
</style>
</head>

<body>
<div class="container">
  <h1>離園人數</h1>
  <div class="label">今日累計</div>
  <div id="count">...</div>
  <div class="label">位遊客已離園</div>

  <div style="margin-top: 20px;">
    <input type="number" inputmode="numeric" id="manualInput" placeholder="輸入數字後按送出">
  </div>

  <div class="control">
    <button class="btn-plus-1" onclick="sendDelta(1)">+ 1</button>
    <button class="btn-plus-5" onclick="sendDelta(5)">+ 5</button>
  </div>

  <button class="submit" id="mainBtn" onclick="handleManual()">送出輸入人數</button>

  <div class="note">數據將同步至長官的後慈湖總帳</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let currentOut = 0;
let isSending = false;

// 初始化：讀取最新人數
async function fetchCurrent() {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    updateDisplay(data.out);
  } catch (err) {
    document.getElementById("count").innerText = "ERR";
  }
}

function updateDisplay(val) {
  currentOut = Number(val || 0);
  document.getElementById("count").innerText = currentOut;
}

// 處理手動輸入框的送出
function handleManual() {
  const inputEl = document.getElementById("manualInput");
  const val = parseInt(inputEl.value);
  if (isNaN(val) || val <= 0) {
    alert("請輸入正確的人數");
    return;
  }
  sendDelta(val);
  inputEl.value = "";
  inputEl.blur(); // 收起鍵盤
}

// 核心傳送邏輯
async function sendDelta(delta) {
  if (isSending) return;
  if (!confirm(`確認回報 ${delta} 位遊客離園？`)) return;

  const btn = document.getElementById("mainBtn");
  isSending = true;
  btn.disabled = true;
  btn.innerText = "同步中...";

  if (navigator.vibrate) navigator.vibrate(50); // 震動回饋

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "OUT",
        delta: delta,
        source: "VOLUNTEER_APP"
      })
    });

    const data = await res.json();
    updateDisplay(data.out);
    
  } catch (err) {
    alert("❌ 傳送失敗，請檢查網路連線");
  } finally {
    isSending = false;
    btn.disabled = false;
    btn.innerText = "送出輸入人數";
  }
}

window.addEventListener("load", fetchCurrent);
</script>
</body>
</html>
