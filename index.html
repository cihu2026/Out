<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後慈湖｜離園控管</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f2;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #fff;
  width: 95%;
  max-width: 420px;
  padding: 28px 20px 32px;
  border-radius: 22px;
  border-top: 14px solid #f05a5a;
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 28px;
}

.sub {
  color: #777;
  margin-top: 6px;
  margin-bottom: 18px;
}

.display {
  background: #fdeeee;
  border-radius: 18px;
  padding: 26px 10px;
  margin-bottom: 22px;
}

#status {
  font-size: 72px;
  font-weight: bold;
  color: #e74c3c;
}

.unit {
  margin-top: 6px;
  color: #e67e73;
}

.row {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
}

.btn {
  flex: 1;
  font-size: 28px;
  padding: 20px;
  border-radius: 18px;
  border: none;
  color: #fff;
  cursor: pointer;
}

.plus5 { background: #7ac943; }
.plus1 { background: #f5b041; }

.fix {
  width: 100%;
  background: #9e9e9e;
  font-size: 22px;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 14px;
}

input {
  width: 100%;
  font-size: 22px;
  padding: 16px;
  border-radius: 14px;
  border: 2px solid #ddd;
  text-align: center;
  margin-bottom: 18px;
}

.submit {
  width: 100%;
  background: #f05a5a;
  color: #fff;
  font-size: 26px;
  padding: 22px;
  border: none;
  border-radius: 20px;
}

.footer {
  margin-top: 14px;
  font-size: 13px;
  color: #aaa;
}
</style>
</head>

<body>
<div class="container">
  <h1>離園控管</h1>
  <div class="sub">今日累計離園</div>

  <div class="display">
    <div id="status">讀取中…</div>
    <div class="unit">人</div>
  </div>

  <div class="row">
    <button class="btn plus5" onclick="sendDelta(5)">＋5</button>
    <button class="btn plus1" onclick="sendDelta(1)">＋1</button>
  </div>

  <button class="btn fix" onclick="sendDelta(-1)">
    打錯了？扣回 1 人
  </button>

  <input
    id="customInput"
    type="number"
    inputmode="numeric"
    placeholder="輸入數字（如 -10）"
  >

  <button class="submit" onclick="sendCustom()">送出數據</button>

  <div class="footer">數據與驗票系統同步連動</div>
</div>

<script>
/* ===============================
   後慈湖 離園控管（正式版）
   =============================== */

/* 🔴 請換成你自己的 GAS 網址 */
const GAS_URL = "https://script.google.com/macros/s/你的GAS_ID/exec";

const statusEl = document.getElementById("status");

/* ✅ 載入目前離園總數 */
window.addEventListener("load", async () => {
  try {
    statusEl.innerText = "讀取中…";
    const res = await fetch(GAS_URL);
    const data = await res.json();
    statusEl.innerText = data.out;
  } catch (e) {
    statusEl.innerText = "連線失敗";
  }
});

/* ✅ 送出增量（delta） */
async function sendDelta(delta) {
  if (!Number.isInteger(delta) || delta === 0) return;
  if (!confirm(`送出 ${delta} 人離園？`)) return;

  try {
    statusEl.innerText = "更新中…";
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "OUT",
        delta: Math.abs(delta),
        source: delta > 0 ? "MANUAL" : "CORRECT"
      })
    });

    const data = await res.json();
    statusEl.innerText = data.out;
  } catch (e) {
    statusEl.innerText = "傳送失敗";
  }
}

/* ✅ 手動輸入 */
function sendCustom() {
  const input = document.getElementById("customInput");
  const val = Number(input.value);
  if (!Number.isInteger(val) || val === 0) return;
  sendDelta(val);
  input.value = "";
}
</script>
</body>
</html>
