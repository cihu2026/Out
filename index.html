<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖｜離園控管 Turbo PRO v2</title>

<style>
/* 核心佈局優化 */
body {
  margin: 0;
  font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: linear-gradient(160deg, #e0eafc 0%, #cfdef3 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* 主卡片：強化玻璃擬態感 */
.container {
  width: 88%;
  max-width: 380px;
  padding: 30px 24px;
  border-radius: 32px;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  border: 1px solid rgba(255,255,255,0.4);
  text-align: center;
}

h1 {
  font-size: 22px;
  margin: 0 0 20px 0;
  color: #2c3e50;
  font-weight: 800;
}

/* 數字顯示區：增加深度感 */
.display {
  margin: 20px 0;
  padding: 35px 20px;
  border-radius: 24px;
  background: #ffffff;
  box-shadow: 
    inset 0 2px 8px rgba(0,0,0,0.04),
    0 10px 20px rgba(0,0,0,0.05);
  transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#status {
  font-size: 80px;
  font-weight: 900;
  color: #1a2a3a;
  line-height: 1;
  letter-spacing: -2px;
}

.display div:last-child {
  margin-top: 10px;
  color: #7f8c8d;
  font-weight: 600;
  font-size: 14px;
}

/* 動畫回饋 */
.flash {
  animation: bounce .3s ease;
}

@keyframes bounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* 按鈕美化 */
.row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}

button {
  flex: 1;
  padding: 16px 5px;
  font-size: 17px;
  border: none;
  border-radius: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  transition: all 0.1s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  display: flex;
  justify-content: center;
  align-items: center;
}

button:active {
  transform: translateY(2px) scale(0.95);
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* 按鈕色調調優（提升對比度） */
.add { background: linear-gradient(135deg, #2ecc71, #27ae60); }
.addSmall { background: linear-gradient(135deg, #55d68a, #42b983); }
.minus { background: linear-gradient(135deg, #ff5f6d, #ffc371); } /* 漸層暖紅 */
.fix { background: linear-gradient(135deg, #747d8c, #2f3542); }

/* 輸入框美化 */
input {
  width: 100%;
  box-sizing: border-box;
  margin: 10px 0 15px 0;
  padding: 16px;
  border-radius: 16px;
  border: 2px solid #edf2f7;
  font-size: 18px;
  text-align: center;
  background: #f8fafc;
  color: #2d3436;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  border-color: #3498db;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
}

.footer {
  margin-top: 20px;
  font-size: 11px;
  color: #a0aec0;
  letter-spacing: 1px;
  font-weight: 500;
}
</style>
</head>

<body>
<div class="container">

<h1>🌅 後慈湖離園系統</h1>

<div class="display" id="displayBox">
  <div id="status">⏳</div>
  <div>👤 人</div>
</div>

<!-- 快速操作 -->
<div class="row">
  <button class="add" onclick="safeSend(5)">➕5人離園</button>
  <button class="addSmall" onclick="safeSend(1)">➕1人離園</button>
</div>

<div class="row">
  <button class="minus" onclick="safeSend(-1)">➖1（返回）</button>
  <button class="fix" onclick="safeSend(-5)">➖5（返回）</button>
</div>

<!-- 安全輸入 -->
<input id="customInput" type="number" inputmode="numeric" placeholder="輸入數量（不用打正負）">

<div class="row">
  <button class="addSmall" style="background:#3498db" onclick="sendCustom(true)">➕ 離開</button>
  <button class="minus" style="background:#e17055" onclick="sendCustom(false)">➖ 撤回</button>
</div>

<div class="footer">Turbo PRO v2｜防誤觸｜震動回饋｜動畫</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

const statusEl = document.getElementById("status");
const displayBox = document.getElementById("displayBox");

let locked = false;

window.addEventListener("load", fetchCurrent);

async function fetchCurrent(){
  try{
    const res = await fetch(GAS_URL+"?action=getCount");
    const data = await res.json();
    statusEl.innerText = data.current ?? 0;
  }catch{
    statusEl.innerText="❌";
  }
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(40);
  }
}

function animate(){
  displayBox.classList.add("flash");
  setTimeout(()=>displayBox.classList.remove("flash"),300);
}

async function safeSend(val){
  if(locked) return;
  locked = true;

  let text = val>0
    ? `確認 ${val} 人離園？`
    : `扣回 ${Math.abs(val)} 人？`;

  if(!confirm(text)){
    locked=false;
    return;
  }

  vibrate();
  animate();
  statusEl.innerText="⏳";

  try{
    await fetch(GAS_URL,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify({
        type:"OUT",
        delta:val,
        source:"離園端操作"
      })
    });

    setTimeout(fetchCurrent,800);

  }catch{
    alert("傳送失敗");
    fetchCurrent();
  }

  setTimeout(()=>locked=false,800);
}

function sendCustom(isAdd){
  const input = document.getElementById("customInput");
  let val = parseInt(input.value);

  if(isNaN(val) || val<=0){
    alert("請輸入正整數");
    return;
  }

  val = isAdd ? val : -val;
  safeSend(val);
  input.value="";
}
</script>

</body>
</html>
