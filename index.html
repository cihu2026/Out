<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖｜離園控管 Turbo PRO v2</title>

<style>
/* 核心佈局優化 */
body {
  margin: 0;
  font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: #f0f4f8; /* 改為純色背景減少渲染負擔 */
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

.container {
  width: 90%;
  max-width: 380px;
  padding: 25px 20px;
  border-radius: 24px;
  background: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

h1 {
  font-size: 20px;
  margin: 0 0 15px 0;
  color: #2c3e50;
}

/* 數字顯示區：加快反應速度感 */
.display {
  margin: 15px 0;
  padding: 30px 20px;
  border-radius: 20px;
  background: #f8fafc;
  border: 2px solid #edf2f7;
}

#status {
  font-size: 85px; /* 稍微加大 */
  font-weight: 900;
  color: #1a2a3a;
  line-height: 1;
  transition: transform 0.1s ease; /* 極速縮放 */
}

/* 加快動畫速度 */
.flash {
  animation: quickBounce .15s ease;
}

@keyframes quickBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

button {
  flex: 1;
  padding: 18px 5px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  transition: transform 0.05s linear; /* 幾乎瞬間反應 */
  box-shadow: 0 4px 0 rgba(0,0,0,0.1);
}

button:active {
  transform: translateY(3px); /* 更有按鈕實體感 */
  box-shadow: none;
}

.add { background: #27ae60; }
.addSmall { background: #2ecc71; }
.minus { background: #e74c3c; }
.fix { background: #34495e; }

input {
  width: 100%;
  box-sizing: border-box;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid #dfe6e9;
  font-size: 20px;
  text-align: center;
}

.footer {
  margin-top: 15px;
  font-size: 11px;
  color: #b2bec3;
}
</style>
</head>

<body>
<div class="container">

<h1>🌅 後慈湖離園系統</h1>

<div class="display" id="displayBox">
  <div id="status">⏳</div>
  <div>👤 人</div>
</div>

<div class="row">
  <button class="add" onclick="safeSend(5)">➕5人離園</button>
  <button class="addSmall" onclick="safeSend(1)">➕1人離園</button>
</div>

<div class="row">
  <button class="minus" onclick="safeSend(-1)">➖1（返回）</button>
  <button class="fix" onclick="safeSend(-5)">➖5（返回）</button>
</div>

<input id="customInput" type="number" inputmode="numeric" placeholder="輸入數量">

<div class="row">
  <button class="addSmall" style="background:#3498db" onclick="sendCustom(true)">➕ 離開</button>
  <button class="minus" style="background:#e67e22" onclick="sendCustom(false)">➖ 撤回</button>
</div>

<div class="footer">Turbo PRO v2.1｜極速回饋版</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

const statusEl = document.getElementById("status");
const displayBox = document.getElementById("displayBox");

let locked = false;
let currentVal = 0; // 暫存目前數值

window.addEventListener("load", fetchCurrent);

async function fetchCurrent(){
  try{
    const res = await fetch(GAS_URL+"?action=getCount");
    const data = await res.json();
    currentVal = data.current ?? 0;
    statusEl.innerText = currentVal;
  }catch{
    statusEl.innerText="❌";
  }
}

function vibrate(){
  if(navigator.vibrate) navigator.vibrate(25); // 縮短震動時間感
}

function animate(){
  displayBox.classList.remove("flash");
  void displayBox.offsetWidth; // 強制重繪觸發動畫
  displayBox.classList.add("flash");
}

async function safeSend(val){
  if(locked) return;
  
  let text = val>0 ? `確認 ${val} 人離園？` : `扣回 ${Math.abs(val)} 人？`;
  if(!confirm(text)) return;

  locked = true;
  vibrate();
  animate();

  // --- 極速關鍵：預判更新 ---
  // 先在畫面加減數字，不等待 API 回傳
  currentVal += val;
  statusEl.innerText = currentVal;
  statusEl.style.opacity = "0.6"; // 變淡表示「同步中」

  try {
    // 使用 fetch 的並行處理，不阻塞後續動作
    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        type: "OUT",
        delta: val,
        source: "Turbo-Fast-v2"
      })
    }).then(() => {
      statusEl.style.opacity = "1"; // 同步完成恢復亮度
      locked = false;
    });

    // 延遲一段時間重新抓取真實數據確保準確
    setTimeout(fetchCurrent, 1500); 

  } catch(e) {
    alert("傳送失敗");
    fetchCurrent();
    locked = false;
  }
}

function sendCustom(isAdd){
  const input = document.getElementById("customInput");
  let val = parseInt(input.value);
  if(isNaN(val) || val<=0) return;
  val = isAdd ? val : -val;
  safeSend(val);
  input.value="";
}
</script>

</body>
</html>
