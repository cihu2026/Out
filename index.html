<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖｜離園控管</title>

<style>
  body { font-family: "Noto Sans TC", sans-serif; background: #121212; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .container { background: #222; width: 90%; max-width: 400px; padding: 30px 20px; border-radius: 25px; border-top: 10px solid #f05a5a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
  h1 { margin: 0; font-size: 26px; color: #ff9b9b; }
  .sub { color: #aaa; margin: 10px 0; font-size: 14px; }
  .display { background: #331a1a; border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid #552222; }
  #status { font-size: 60px; font-weight: bold; color: #f05a5a; }
  .unit { margin-top: 5px; color: #888; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  button { cursor: pointer; transition: 0.2s; border: none; font-family: inherit; }
  button:active { transform: scale(0.95); }
  .btn { flex: 1; font-size: 24px; padding: 20px; border-radius: 15px; color: white; font-weight: bold; }
  .plus5 { background: #27ae60; }
  .plus1 { background: #2ecc71; }
  .fix { width: 100%; background: #555; font-size: 18px; padding: 15px; border-radius: 15px; color: #ccc; margin-bottom: 15px; }
  input { width: 100%; font-size: 20px; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #000; color: white; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
  .submit { width: 100%; background: #f05a5a; color: white; font-size: 22px; padding: 18px; border-radius: 15px; font-weight: bold; }
</style>
</head>

<body>
<div class="container">
  <h1>離園控管</h1>
  <div class="sub">目前場內總人數</div>

  <div class="display">
    <div id="status">讀取中…</div>
    <div class="unit">人</div>
  </div>

  <div class="row">
    <button class="btn plus5" onclick="sendDelta(5)">＋5</button>
    <button class="btn plus1" onclick="sendDelta(1)">＋1</button>
  </div>

  <button class="fix" onclick="sendDelta(-1)">
    打錯了？扣回 1 人 (離園 -1)
  </button>

  <input id="customInput" type="number" inputmode="numeric" placeholder="手動輸入數字 (如 10)">
  <button class="submit" onclick="sendCustom()">送出離園數據</button>

  <div style="margin-top: 15px; font-size: 12px; color: #666;">數據與驗票系統同步連動</div>
</div>

<script>
// 🔴 請確保此 URL 與 Code.gs 部署網址一致
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

const statusEl = document.getElementById("status");

// 載入時先抓取目前場內人數 (或可改為顯示累計離園，依你 GAS 邏輯而定)
// 這裡預設顯示 GAS 回傳的 current (場內人數)
window.addEventListener("load", fetchCurrent);

async function fetchCurrent() {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    // 根據你 code.gs 的 returnCount 回傳結果，欄位是 current
    statusEl.innerText = data.current !== undefined ? data.current : "??";
  } catch (e) {
    statusEl.innerText = "Error";
  }
}

async function sendDelta(delta) {
  if (delta === 0) return;
  const actionText = delta > 0 ? `登記 ${delta} 人離園？` : `扣回 ${Math.abs(delta)} 人？`;
  if (!confirm(actionText)) return;

  statusEl.innerText = "更新中…";

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors", // 注意：由於 GAS 的 CORS 限制，有時需要 no-cors，但 no-cors 無法讀取回傳值
      body: JSON.stringify({
        type: "OUT",
        delta: delta, // 直接傳送原始正負值，由 GAS 處理
        source: "離園端操作",
        note: delta > 0 ? "正常離園" : "操作錯誤修正"
      })
    });

    // 提示：因為 fetch POST 到 GAS 常會遇到重定向問題，
    // 這裡為了保險，傳送後 1 秒重新抓取最新人數
    setTimeout(fetchCurrent, 1000);
  } catch (e) {
    alert("傳送失敗，請檢查網路");
    fetchCurrent();
  }
}

function sendCustom() {
  const input = document.getElementById("customInput");
  const val = parseInt(input.value);
  if (isNaN(val) || val === 0) return alert("請輸入有效數字");
  sendDelta(val);
  input.value = "";
}
</script>
</body>
</html>
