<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⏱️ 後慈湖｜離園控管</title>

<style>
  /* 調整為明亮背景 */
  body { 
    font-family: "Noto Sans TC", sans-serif; 
    background: #f4f7f9; 
    color: #333; 
    margin: 0; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
  }

  /* 卡片改為白色陰影風 */
  .container { 
    background: #ffffff; 
    width: 90%; 
    max-width: 400px; 
    padding: 35px 25px; 
    border-radius: 30px; 
    border-top: 12px solid #3498db; /* 頂部改為藍色 */
    box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
    text-align: center; 
  }

  h1 { margin: 0; font-size: 28px; color: #2c3e50; }
  .sub { color: #7f8c8d; margin: 10px 0; font-size: 15px; }

  /* 數字顯示區改為淡藍色 */
  .display { 
    background: #ebf5fb; 
    border-radius: 20px; 
    padding: 25px; 
    margin: 20px 0; 
    border: 1px solid #d6eaf8; 
  }

  #status { font-size: 64px; font-weight: 800; color: #2980b9; } /* 大數字藍色 */
  .unit { margin-top: 5px; color: #5dade2; font-weight: bold; }

  .row { display: flex; gap: 12px; margin-bottom: 12px; }
  
  button { cursor: pointer; transition: 0.2s; border: none; font-family: inherit; }
  button:active { transform: scale(0.95); }

  /* 按鈕顏色調整 */
  .btn { flex: 1; font-size: 24px; padding: 20px; border-radius: 18px; color: white; font-weight: bold; }
  .plus5 { background: #27ae60; } /* 保持綠色代表增加 */
  .plus1 { background: #2ecc71; }

  /* 修正按鈕改為灰色 */
  .fix { 
    width: 100%; 
    background: #bdc3c7; 
    font-size: 18px; 
    padding: 15px; 
    border-radius: 15px; 
    color: #444; 
    margin-bottom: 15px; 
  }

  input { 
    width: 100%; 
    font-size: 20px; 
    padding: 15px; 
    border-radius: 12px; 
    border: 2px solid #ddd; 
    background: #fff; 
    color: #333; 
    text-align: center; 
    margin-bottom: 15px; 
    box-sizing: border-box;
  }

  /* 送出按鈕改為深藍色 */
  .submit { 
    width: 100%; 
    background: #3498db; 
    color: white; 
    font-size: 22px; 
    padding: 18px; 
    border-radius: 15px; 
    font-weight: bold; 
    box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
  }

  .footer { margin-top: 18px; font-size: 12px; color: #bdc3c7; }
</style>
</head>

<body>
<div class="container">
  <h1>離園控管</h1>
  <div class="sub">目前場內總人數</div>

  <div class="display">
    <div id="status">讀取中…</div>
    <div class="unit">人</div>
  </div>

  <div class="row">
    <button class="btn plus5" onclick="sendDelta(5)">＋5</button>
    <button class="btn plus1" onclick="sendDelta(1)">＋1</button>
  </div>

  <button class="fix" onclick="sendDelta(-1)">
    打錯了？扣回 1 人 (離園 -1)
  </button>

  <input id="customInput" type="number" inputmode="numeric" placeholder="手動輸入 (例如 10)">
  <button class="submit" onclick="sendCustom()">確認送出數據</button>

  <div class="footer">數據與驗票系統同步連動</div>
</div>

<script>
// 🔴 確保此 URL 與 Code.gs 部署網址一致
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

const statusEl = document.getElementById("status");

window.addEventListener("load", fetchCurrent);

async function fetchCurrent() {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    statusEl.innerText = data.current !== undefined ? data.current : "??";
  } catch (e) {
    statusEl.innerText = "Error";
  }
}

async function sendDelta(delta) {
  if (delta === 0) return;
  const actionText = delta > 0 ? `登記 ${delta} 人離園？` : `扣回 ${Math.abs(delta)} 人？`;
  if (!confirm(actionText)) return;

  statusEl.innerText = "更新中…";

  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors", 
      body: JSON.stringify({
        type: "OUT",
        delta: delta,
        source: "離園端操作"
      })
    });

    // 延遲更新畫面
    setTimeout(fetchCurrent, 1200);
  } catch (e) {
    alert("傳送失敗");
    fetchCurrent();
  }
}

function sendCustom() {
  const input = document.getElementById("customInput");
  const val = parseInt(input.value);
  if (isNaN(val) || val === 0) return alert("請輸入有效數字");
  sendDelta(val);
  input.value = "";
}
</script>
</body>
</html>
