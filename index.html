<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱️ 後慈湖｜離園控管 Turbo PRO v2</title>

<style>
body{
  margin:0;
  font-family:-apple-system,"Noto Sans TC",sans-serif;
  background:linear-gradient(135deg,#e0f7fa,#fffde7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  padding:30px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.1);
}

h1{
  margin:0;
  font-size:26px;
  color:#006064;
}

.display{
  margin:20px 0;
  background:#e0f2f1;
  border-radius:20px;
  padding:25px;
  transition:0.2s;
}

#status{
  font-size:70px;
  font-weight:900;
  color:#00796b;
}

.flash{
  animation:flash 0.3s;
}

@keyframes flash{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

button{
  flex:1;
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:18px;
  color:#fff;
  font-weight:700;
  transition:0.15s;
}

button:active{
  transform:scale(0.95);
}

.add{background:#43a047;}
.addSmall{background:#66bb6a;}
.minus{background:#ef5350;}
.fix{background:#78909c;}

input{
  width:100%;
  padding:15px;
  font-size:18px;
  border-radius:12px;
  border:2px solid #ccc;
  text-align:center;
  margin-top:10px;
}

.footer{
  margin-top:15px;
  font-size:12px;
  color:#90a4ae;
}
</style>
</head>

<body>
<div class="container">

<h1>🌅 後慈湖離園</h1>

<div class="display" id="displayBox">
  <div id="status">⏳</div>
  <div>👤 人</div>
</div>

<!-- 快速操作 -->
<div class="row">
  <button class="add" onclick="safeSend(5)">➕ +5</button>
  <button class="addSmall" onclick="safeSend(1)">➕ +1</button>
</div>

<div class="row">
  <button class="minus" onclick="safeSend(-1)">➖ -1</button>
  <button class="fix" onclick="safeSend(-5)">🔧 -5</button>
</div>

<!-- 安全輸入 -->
<input id="customInput" type="number" placeholder="輸入數量（不用打正負）">

<div class="row">
  <button class="addSmall" onclick="sendCustom(true)">➕ 增加</button>
  <button class="minus" onclick="sendCustom(false)">➖ 扣回</button>
</div>

<div class="footer">Turbo PRO v2｜防誤觸｜震動回饋｜動畫</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

const statusEl = document.getElementById("status");
const displayBox = document.getElementById("displayBox");

let locked = false; // 防連點鎖

window.addEventListener("load", fetchCurrent);

async function fetchCurrent(){
  try{
    const res = await fetch(GAS_URL+"?action=getCount");
    const data = await res.json();
    statusEl.innerText = data.current ?? 0;
  }catch{
    statusEl.innerText="❌";
  }
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(30);
  }
}

function animate(){
  displayBox.classList.add("flash");
  setTimeout(()=>displayBox.classList.remove("flash"),300);
}

async function safeSend(val){

  if(locked) return; // 🔒 防暴擊
  locked = true;

  let text = val>0
    ? `確認 ${val} 人離園？`
    : `扣回 ${Math.abs(val)} 人？`;

  if(!confirm(text)){
    locked=false;
    return;
  }

  vibrate();
  animate();
  statusEl.innerText="⏳";

  try{
    await fetch(GAS_URL,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify({
        type:"OUT",
        delta:val,
        source:"Turbo PRO v2"
      })
    });

    setTimeout(fetchCurrent,800);

  }catch{
    alert("傳送失敗");
    fetchCurrent();
  }

  setTimeout(()=>locked=false,800); // 解鎖
}

function sendCustom(isAdd){
  const input = document.getElementById("customInput");
  let val = parseInt(input.value);

  if(isNaN(val) || val<=0){
    alert("請輸入正整數");
    return;
  }

  val = isAdd ? val : -val;

  safeSend(val);
  input.value="";
}
</script>

</body>
</html>
