<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後慈湖｜志工離園人數控管</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f2f5;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #fff;
  width: 95%;
  max-width: 420px;
  padding: 30px 20px;
  border-radius: 20px;
  text-align: center;
  border-top: 12px solid #ff4d4f;
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
}

h1 {
  margin: 0 0 10px;
}

#count {
  font-size: 120px;
  font-weight: bold;
  color: #ff4d4f;
  margin: 20px 0;
}

.label {
  color: #555;
  font-size: 20px;
}

.control {
  display: flex;
  gap: 20px;
  margin: 25px 0;
}

.control button {
  flex: 1;
  height: 110px;
  font-size: 56px;
  font-weight: bold;
  border: none;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

.minus {
  background: #999;
}

.plus {
  background: #52c41a;
}

input {
  width: 100%;
  font-size: 36px;
  padding: 18px;
  text-align: center;
  border-radius: 16px;
  border: 3px solid #ffaaa5;
  margin-bottom: 20px;
}

.submit {
  width: 100%;
  font-size: 34px;
  padding: 26px;
  border-radius: 20px;
  background: #ff4d4f;
  color: white;
  border: none;
  cursor: pointer;
}

.note {
  margin-top: 12px;
  font-size: 14px;
  color: #999;
}
</style>
</head>

<body>
<div class="container">
  <h1>離園人數</h1>
  <div class="label">目前累積</div>

  <div id="count">0</div>
  <div class="label">位遊客已離園</div>

  <input
    type="number"
    inputmode="numeric"
    placeholder="直接輸入離園人數"
    onchange="sendByInput(this)"
  >

  <div class="control">
    <button class="minus" onclick="sendDelta(1)">− 1</button>
    <button class="plus" onclick="sendDelta(5)">＋ 5</button>
  </div>

  <button class="submit" onclick="sendDelta(1)">確認送出 +1</button>

  <div class="note">所有操作即時同步至人流總帳</div>
</div>

<script>
/* ===============================
   後慈湖 Out 網站（正式上線版）
   - 只送 delta（增量）
   - Google Sheets 為唯一權威
   =============================== */

/* ▶▶▶ 換成你自己的 GAS 網址 ▶▶▶ */
const GAS_URL = "https://-script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let currentOut = 0;

/* ✅ 頁面載入：取得目前離園總數 */
window.addEventListener("load", async () => {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    currentOut = Number(data.out || 0);
    document.getElementById("count").innerText = currentOut;
  } catch (err) {
    alert("❌ 無法連線人流總帳，請確認網路");
  }
});

/* ✅ 核心：只送『這次變多少』 */
async function sendDelta(delta) {
  if (!Number.isInteger(delta) || delta <= 0) return;
  if (!confirm(`送出 ${delta} 人離園？`)) return;

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "OUT",
        delta: delta,
        source: "MANUAL"
      })
    });

    const data = await res.json();
    currentOut = Number(data.out || currentOut);
    document.getElementById("count").innerText = currentOut;

  } catch (err) {
    alert("❌ 傳送失敗，請確認網路");
  }
}

/* ✅ 手機數字鍵盤輸入 */
function sendByInput(el) {
  const val = Number(el.value);
  if (val > 0) {
    sendDelta(val);
    el.value = "";
  }
}
</script>
</body>
</html>
