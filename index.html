<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>後慈湖｜志工離園控管</title>
<style>
  :root { --primary-color: #ff4d4f; --success-color: #52c41a; --warning-color: #ffa940; --correction-color: #8c8c8c; --bg-color: #f0f2f5; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  .container { background: #fff; width: 92%; max-width: 420px; padding: 25px; border-radius: 24px; text-align: center; border-top: 12px solid var(--primary-color); box-shadow: 0 15px 35px rgba(0,0,0,0.1); box-sizing: border-box; }
  h1 { margin: 0; font-size: 24px; color: #333; }
  .label { color: #888; font-size: 16px; margin-bottom: 5px; }
  .count-box { background: #fff1f0; border: 2px solid #ffccc7; border-radius: 16px; padding: 15px; margin: 15px 0; }
  #count { font-size: 100px; font-weight: 900; color: var(--primary-color); line-height: 1; display: block; }
  .control-row { display: flex; gap: 12px; margin-bottom: 12px; }
  button { border: none; border-radius: 16px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
  button:active { transform: scale(0.95); }
  .btn-main-add { flex: 2; height: 80px; font-size: 32px; background: var(--success-color); }
  .btn-quick-add { flex: 1; height: 80px; font-size: 32px; background: var(--warning-color); }
  .btn-fix { flex: 1; height: 60px; font-size: 20px; background: var(--correction-color); }
  .input-area { margin: 15px 0; }
  input { width: 100%; font-size: 24px; padding: 12px; text-align: center; border-radius: 12px; border: 2px solid #ddd; box-sizing: border-box; }
  .submit-all { width: 100%; padding: 18px; font-size: 24px; background: var(--primary-color); color: white; border-radius: 16px; box-shadow: 0 4px 0 #cf1322; }
  .submit-all:active { transform: translateY(4px); box-shadow: none; }
  .note { font-size: 12px; color: #aaa; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>離園控管</h1>
  <div class="label">今日累計離園</div>
  <div class="count-box"><div id="count">...</div><div style="color:#ff7875">人</div></div>
  <div class="control-row">
    <button class="btn-main-add" onclick="sendDelta(5)">+ 5</button>
    <button class="btn-quick-add" onclick="sendDelta(1)">+ 1</button>
  </div>
  <div class="control-row"><button class="btn-fix" onclick="sendDelta(-1)">打錯了？ 扣回 - 1</button></div>
  <div class="input-area"><input type="number" id="manualInput" placeholder="輸入數字(如-10)"></div>
  <button class="submit-all" id="mainBtn" onclick="handleManual()">送出數據</button>
  <div class="note">數據與驗票系統同步連動</div>
</div>

<script>
// 🎫 請確保這裡貼的是你最新部署的網址
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

let currentOut = 0;
let isSending = false;

async function fetchCurrent() {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    updateDisplay(data.out);
  } catch (err) { document.getElementById("count").innerText = "ERR"; }
}

function updateDisplay(val) {
  currentOut = Number(val || 0);
  document.getElementById("count").innerText = currentOut;
}

function handleManual() {
  const inputEl = document.getElementById("manualInput");
  const val = parseInt(inputEl.value);
  if (isNaN(val) || val === 0) return;
  sendDelta(val);
  inputEl.value = "";
}

async function sendDelta(delta) {
  if (isSending) return;
  if (!confirm(delta > 0 ? `確認送出 ${delta} 人？` : `確認扣除 ${Math.abs(delta)} 人？`)) return;
  
  const btn = document.getElementById("mainBtn");
  isSending = true; btn.disabled = true; btn.innerText = "同步中...";

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ type: "OUT", delta: delta, source: "離園App點擊" })
    });
    const data = await res.json();
    updateDisplay(data.out); // 用試算表精確數值更新
  } catch (err) {
    alert("網路異常，已嘗試預計更新");
    updateDisplay(currentOut + delta);
  } finally {
    isSending = false; btn.disabled = false; btn.innerText = "送出數據";
  }
}
window.addEventListener("load", fetchCurrent);
</script>
</body>
</html>
