<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏱️ 後慈湖｜離園控管 Turbo PRO v2</title>

<style>
body{
  margin:0;
  font-family:-apple-system,"Noto Sans TC",sans-serif;
  background:linear-gradient(135deg,#eef3f7,#fdfcfb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 主卡片 */
.container{
  width:92%;
  max-width:420px;
  padding:28px;
  border-radius:28px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 25px 60px rgba(0,0,0,0.08);
  text-align:center;
}

/* 標題 */
h1{
  font-size:24px;
  margin:0;
  color:#2f4f4f;
  letter-spacing:1px;
}

/* 顯示區 */
.display{
  margin:22px 0;
  padding:28px;
  border-radius:22px;
  background:linear-gradient(145deg,#ffffff,#f1f3f6);
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.05),
    0 10px 25px rgba(0,0,0,0.06);
  transition:0.25s;
}

/* 數字 */
#status{
  font-size:72px;
  font-weight:900;
  color:#263238;
  letter-spacing:-2px;
}

/* 動畫 */
.flash{
  animation:softFlash .25s ease;
}

@keyframes softFlash{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* 按鈕區 */
.row{
  display:flex;
  gap:12px;
  margin-bottom:12px;
}

button{
  flex:1;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:16px;
  font-weight:700;
  color:#fff;
  letter-spacing:.5px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:all .15s ease;
}

button:active{
  transform:scale(0.96);
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* 按鈕色系（柔和版） */
.add{
  background:linear-gradient(135deg,#4caf50,#81c784);
}
.addSmall{
  background:linear-gradient(135deg,#66bb6a,#a5d6a7);
}
.minus{
  background:linear-gradient(135deg,#ef5350,#e57373);
}
.fix{
  background:linear-gradient(135deg,#90a4ae,#b0bec5);
}

/* 輸入框 */
input{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:1.5px solid #dfe3e8;
  font-size:18px;
  text-align:center;
  background:#fafafa;
  transition:0.2s;
}

input:focus{
  outline:none;
  border-color:#90caf9;
  background:#fff;
}

/* 底部 */
.footer{
  margin-top:16px;
  font-size:12px;
  color:#9e9e9e;
  letter-spacing:.5px;
}
</style>
</head>

<body>
<div class="container">

<h1>🌅 後慈湖離園</h1>

<div class="display" id="displayBox">
  <div id="status">⏳</div>
  <div>👤 人</div>
</div>

<!-- 快速操作 -->
<div class="row">
  <button class="add" onclick="safeSend(5)">➕ +5</button>
  <button class="addSmall" onclick="safeSend(1)">➕ +1</button>
</div>

<div class="row">
  <button class="minus" onclick="safeSend(-1)">➖ -1</button>
  <button class="fix" onclick="safeSend(-5)">🔧 -5</button>
</div>

<!-- 安全輸入 -->
<input id="customInput" type="number" placeholder="輸入數量（不用打正負）">

<div class="row">
  <button class="addSmall" onclick="sendCustom(true)">➕ 增加</button>
  <button class="minus" onclick="sendCustom(false)">➖ 扣回</button>
</div>

<div class="footer">Turbo PRO v2｜防誤觸｜震動回饋｜動畫</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

const statusEl = document.getElementById("status");
const displayBox = document.getElementById("displayBox");

let locked = false; // 防連點鎖

window.addEventListener("load", fetchCurrent);

async function fetchCurrent(){
  try{
    const res = await fetch(GAS_URL+"?action=getCount");
    const data = await res.json();
    statusEl.innerText = data.current ?? 0;
  }catch{
    statusEl.innerText="❌";
  }
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(30);
  }
}

function animate(){
  displayBox.classList.add("flash");
  setTimeout(()=>displayBox.classList.remove("flash"),300);
}

async function safeSend(val){

  if(locked) return; // 🔒 防暴擊
  locked = true;

  let text = val>0
    ? `確認 ${val} 人離園？`
    : `扣回 ${Math.abs(val)} 人？`;

  if(!confirm(text)){
    locked=false;
    return;
  }

  vibrate();
  animate();
  statusEl.innerText="⏳";

  try{
    await fetch(GAS_URL,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify({
        type:"OUT",
        delta:val,
        source:"Turbo PRO v2"
      })
    });

    setTimeout(fetchCurrent,800);

  }catch{
    alert("傳送失敗");
    fetchCurrent();
  }

  setTimeout(()=>locked=false,800); // 解鎖
}

function sendCustom(isAdd){
  const input = document.getElementById("customInput");
  let val = parseInt(input.value);

  if(isNaN(val) || val<=0){
    alert("請輸入正整數");
    return;
  }

  val = isAdd ? val : -val;

  safeSend(val);
  input.value="";
}
</script>

</body>
</html>
